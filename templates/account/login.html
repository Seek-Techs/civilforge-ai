<!--
  templates/account/login.html
  Overrides allauth's default login page.

  CONCEPT: {{ form }}
  allauth passes a "form" object to this template automatically.
  A Django form knows its fields, validation rules, and errors.
  We render each field manually so we can control the HTML/styling.

  CONCEPT: url tag
  allauth registers URL names like 'account_signup', 'account_login' etc.
  Using the url tag instead of hardcoding '/accounts/signup/' means if the
  URL ever changes, your links still work automatically.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — CivilForge AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c5e 0%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .auth-card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,.35);
        }
        .brand { color: #f4a228; font-weight: 700; font-size: 1.8rem; letter-spacing: 1px; }
        .btn-primary-cf { background: #f4a228; border: none; color: #fff; font-weight: 600; padding: .65rem 2rem; }
        .btn-primary-cf:hover { background: #d88c1a; color: #fff; }
        .form-control:focus { border-color: #f4a228; box-shadow: 0 0 0 .2rem rgba(244,162,40,.25); }
        .divider { color: #aaa; font-size: .85rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-9 col-md-6 col-lg-4">
            <div class="card auth-card p-4 p-md-5">

                <!-- Brand header -->
                <div class="text-center mb-4">
                    <div class="brand"><i class="bi bi-building-gear me-2"></i>CivilForge</div>
                    <div class="text-muted small mt-1">AI-Powered BOQ Analysis</div>
                </div>

                <!-- Error messages -->
                {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    Invalid email or password. Please try again.
                </div>
                {% endif %}

                <!-- Non-field errors (e.g. "account locked") -->
                {% for error in form.non_field_errors %}
                <div class="alert alert-warning py-2 small">{{ error }}</div>
                {% endfor %}

                <!-- Login form -->
                <form method="post" action="{% url 'account_login' %}">
                    {% csrf_token %}

                    <!-- "next" tells Django where to redirect after login -->
                    {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
                    {% endif %}

                    <!-- Email field -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="login" class="form-control"
                                   placeholder="you@example.com"
                                   value="{{ form.login.value|default:'' }}"
                                   autocomplete="email" autofocus>
                        </div>
                    </div>

                    <!-- Password field -->
                    <div class="mb-1">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" autocomplete="current-password">
                        </div>
                    </div>

                    <!-- Forgot password link -->
                    <div class="text-end mb-3">
                        <a href="{% url 'account_reset_password' %}" class="small text-muted">
                            Forgot password?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-primary-cf w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </form>

                <hr class="my-4">

                <div class="text-center small">
                    Don't have an account?
                    <a href="{% url 'account_signup' %}" class="fw-semibold" style="color:#f4a228">
                        Create one free
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
