<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CivilForge AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a3c5e 0%, #0d2137 100%); min-height: 100vh; display:flex; align-items:center; }
        .login-card { border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
        .brand { color: #f4a228; font-weight: 700; font-size: 1.8rem; letter-spacing: 1px; }
        .btn-login { background: #f4a228; border:none; color:#fff; font-weight:600; padding:.65rem 2rem; }
        .btn-login:hover { background: #d88c1a; color:#fff; }
        .form-control:focus { border-color: #f4a228; box-shadow: 0 0 0 .2rem rgba(244,162,40,.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-8 col-md-5 col-lg-4">
                <div class="card login-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="brand mb-1"><i class="bi bi-building-gear me-2"></i>CivilForge</div>
                        <div class="text-muted small">AI-Powered BOQ Analysis</div>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger py-2 text-center">
                        <i class="bi bi-x-circle me-1"></i>Invalid username or password.
                    </div>
                    {% endif %}

                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                {{ form.username }}
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                {{ form.password }}
                            </div>
                        </div>
                        <button type="submit" class="btn btn-login w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Add Bootstrap classes to Django form inputs
        document.querySelectorAll('input[type=text], input[type=password]').forEach(el => {
            el.classList.add('form-control');
        });
    </script>
</body>
</html>
