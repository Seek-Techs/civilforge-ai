<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent — CivilForge AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style> body{background:#f5f7fa;min-height:100vh;display:flex;align-items:center;} .brand{color:#1a3c5e;font-weight:700;font-size:1.4rem;} </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 text-center">
                <div class="brand mb-4"><i class="bi bi-building-gear me-2"></i>CivilForge</div>
                <i class="bi bi-envelope-check display-3 text-success mb-3"></i>
                <h4 class="fw-bold">Reset link sent</h4>
                <p class="text-muted">
                    If an account exists for that email, a password reset link has been sent.
                    Check your inbox (and spam folder).
                </p>
                <div class="alert alert-info small text-start mt-2">
                    <i class="bi bi-info-circle me-1"></i>
                    <strong>Development mode:</strong> Check your terminal for the reset link.
                </div>
                <a href="{% url 'account_login' %}" class="btn btn-outline-secondary mt-2">Back to sign in</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
