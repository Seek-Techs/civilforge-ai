<!--
  templates/account/email_confirm.html
  This page is shown when the user clicks the link in their confirmation email.
  allauth passes a `confirmation` object and a `can_confirm` boolean.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Email — CivilForge AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f5f7fa; min-height: 100vh; display:flex; align-items:center; }
        .brand { color: #1a3c5e; font-weight: 700; font-size: 1.4rem; }
        .btn-cf { background: #f4a228; border: none; color: #fff; font-weight: 600; }
        .btn-cf:hover { background: #d88c1a; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 text-center">
                <div class="brand mb-4"><i class="bi bi-building-gear me-2"></i>CivilForge</div>

                {% if can_confirm %}
                    <i class="bi bi-envelope-check display-3 text-success mb-3"></i>
                    <h4 class="fw-bold">Confirm your email</h4>
                    <p class="text-muted">
                        Please confirm that <strong>{{ confirmation.email_address.email }}</strong>
                        is your email address.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-cf btn-lg w-100 mt-2">
                            <i class="bi bi-check-circle me-1"></i>Yes, confirm my email
                        </button>
                    </form>
                {% else %}
                    <i class="bi bi-x-circle display-3 text-danger mb-3"></i>
                    <h4 class="fw-bold">Link expired or invalid</h4>
                    <p class="text-muted">
                        This confirmation link is no longer valid.
                        Please request a new one.
                    </p>
                    <a href="{% url 'account_email' %}" class="btn btn-cf btn-lg mt-2">
                        <i class="bi bi-arrow-clockwise me-1"></i>Resend confirmation
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
