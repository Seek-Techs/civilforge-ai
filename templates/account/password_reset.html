<!--
  templates/account/password_reset.html
  User enters their email, gets a reset link sent.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — CivilForge AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg,#1a3c5e,#0d2137); min-height:100vh; display:flex; align-items:center; }
        .auth-card { border-radius:16px; border:none; box-shadow:0 8px 32px rgba(0,0,0,.35); }
        .brand { color:#f4a228; font-weight:700; font-size:1.8rem; }
        .btn-cf { background:#f4a228; border:none; color:#fff; font-weight:600; padding:.65rem 2rem; }
        .btn-cf:hover { background:#d88c1a; color:#fff; }
        .form-control:focus { border-color:#f4a228; box-shadow:0 0 0 .2rem rgba(244,162,40,.25); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-9 col-md-6 col-lg-4">
            <div class="card auth-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="brand"><i class="bi bi-building-gear me-2"></i>CivilForge</div>
                    <div class="text-muted small mt-1">Reset your password</div>
                </div>

                <p class="text-muted small mb-3">
                    Enter your email address and we'll send you a link to reset your password.
                </p>

                <form method="post" action="{% url 'account_reset_password' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control"
                                   placeholder="you@example.com" autocomplete="email" autofocus>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-cf w-100">
                        <i class="bi bi-send me-1"></i>Send reset link
                    </button>
                </form>

                <div class="text-center mt-4 small">
                    <a href="{% url 'account_login' %}" class="text-muted">
                        <i class="bi bi-arrow-left me-1"></i>Back to sign in
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
